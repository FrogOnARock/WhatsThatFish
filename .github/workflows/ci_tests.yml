name: CI_Tests

on:
  push:
    branches:
      - master

  jobs:
    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: setup-python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: install-dependencies
          run: pip install -e ".[dev]"

        - name: run-tests
          run: python -m pytest tests/ -q