name: CI_Tests

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install-dependencies
        run: pip install -e ".[dev]"

      - name: run-tests
        # Skip the heavy release gate (ONNX export/parity/INT8/accuracy) — that
        # runs in release.yml on a v* tag, not on every push.
        run: python -m pytest tests/ -m "not release" -q