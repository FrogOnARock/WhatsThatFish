name: CI_Tests

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: wtf_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install-dependencies
        # CPU-only torch first so the training extras don't pull the ~5 GB
        # nvidia-*-cu12 GPU stack. The `gpu` extra (RAPIDS/cuml-cu13) is
        # deliberately omitted — it can't run on a CPU runner. --no-cache-dir
        # avoids keeping downloaded wheels alongside the unpacked install.
        run: |
          pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -e ".[train,test]"

      - name: run-tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/wtf_test
        run: python -m pytest tests/ -m "not release" -q