# ── Classification Training config ────────────────────────────────────────────────────

# ── Training schedule ────────────────────────────────────────────────────────
epochs: 50
batch_size: 16        # NOTE: trainer reads `batch_size` (was `batch`, silently ignored → always 16)
patience: 10
lr: 3.6357083163555596e-05
weight_decay: 0.001962818847922508
warmup_pct: 0.05      # NOTE: trainer reads `warmup_pct` and now passes it to OneCycleLR pct_start (was the 0.3 default)
loss_weights: [0.0, 0.0, 1.0]
loss_weights_p2: [0.0, 0.6, 0.4]
loss_weights_p3: [0.6, 0.3, 0.1]
max_lr: 0.003476679693190392
min_time_per_phase: 8

# ── Model variant (the A/B/C comparative harness) ────────────────────────────
# Run the three under otherwise-identical config to isolate pretraining + channels:
#   A) 5ch pretrained : pretrained=true,  in_dim=5, layers=[3,4,6,3]
#   B) 3ch pretrained : pretrained=true,  in_dim=3, layers=[3,4,6,3]
#   C) 5ch scratch    : pretrained=false, in_dim=5, layers=[8,8,12,6]  (current baseline)
pretrained: true
in_dim: 5
layers: [8, 8, 12, 6]

# ── Fine-tune schedule (pretrained variants only; ignored when pretrained=false) ──
backbone_lr: 0.0001   # ~10x lower than the heads so pretrained features aren't wrecked
head_lr: 0.001        # heads (+ inflated stem) move fast
freeze_epochs: 3      # Phase A: backbone frozen, train heads/stem; then unfreeze at backbone_lr
