# ── Classification Param Space ──────────────────────────────────────────────────────
# Each parameter entry requires: type (uniform | loguniform | choice | randint),
# min, and max. The loader in od_training.py maps these to ray.tune distributions.


classification:
  # Fine-tuning on iNat pseudo-labels — lower lr + weight_decay vs. LILA scratch training
  lr:
    type: loguniform
    min: 1e-5
    max: 1e-3
  weight_decay:
    type: loguniform
    min: 1e-4
    max: 1e-2
  min_time_per_phase:
    type: fixed
    value: 5
  warmup_pct:
    type: fixed
    value: 0.05
  max_lr:
    type: loguniform
    min: 1e-3
    max: 5e-2
  # Peak head LR caps at 1e-2 — above this, OneCycleLR drives AdamW into
  # divergence (a 1e-1 ceiling let trials sample ~0.09 → loss exploded).
  head_lr:
    type: loguniform
    min: 1e-3
    max: 1e-2
  # Backbone kept BELOW the heads: pretrained features are fragile, so the body
  # moves slowly while the randomly-init heads adapt faster (was 1e-2, too hot).
  backbone_lr:
    type: loguniform
    min: 1e-5
    max: 1e-3
